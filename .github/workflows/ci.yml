name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets docker-publish.yml call this as a reusable workflow, so a
  # release re-runs the exact same test/coverage gate rather than
  # duplicating those steps in a second workflow file.
  workflow_call: {}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIN_COVERAGE: "95"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      # cgo needs these even to `go build`/`go vet`, unlike a pure-Go project.
      - name: Install libusb + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev pkg-config build-essential

      - run: go vet ./...

      - run: go build ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Enforce coverage gate
        run: |
          # internal/scsiusb/usbdevice.go only talks to real USB hardware
          # and can't be meaningfully unit-tested; it's excluded from the
          # coverage total the same way locally (see test.sh / README.md).
          grep -v internal/scsiusb/usbdevice.go coverage.out > coverage.filtered.out
          go tool cover -html=coverage.filtered.out -o coverage.html
          TOTAL=$(go tool cover -func=coverage.filtered.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding usbdevice.go): ${TOTAL}%"
          awk -v total="$TOTAL" -v min="$MIN_COVERAGE" 'BEGIN { exit (total + 0 >= min + 0) ? 0 : 1 }' || {
            echo "::error::Coverage ${TOTAL}% is below the ${MIN_COVERAGE}% target"
            exit 1
          }

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage.html
