name: Publish Docker image

# Tag push only — not every push to main. A plain merge to main just
# runs CI (see ci.yml); nothing gets published until an actual vX.Y.Z
# release tag lands, so :latest always means "latest release," not
# "whatever's currently on main," and each release only builds once
# (previously this also triggered on the branches:[main] push that a
# release's own commit produces, doubling the build for no reason).
on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Re-runs the same test/coverage gate as ci.yml (via workflow_call) so
  # a release can't publish an image that wouldn't have passed CI.
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # linux/amd64 only, by design — see the Dockerfile's own comment:
      # cgo + libusb makes arm64-via-QEMU cross-builds slow and fragile
      # for a single-scanner-model tool with no arm64 hardware target.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
